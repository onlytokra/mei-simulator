<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#0f0f0f;color:#e0e0e0;min-height:100vh}
button{font-family:inherit;cursor:pointer;border:1px solid #333;background:#1a1a1a;color:#e0e0e0;border-radius:8px;padding:7px 14px;font-size:13px;transition:background .15s}
button:hover{background:#252525}
select,input[type=number]{font-family:inherit;background:#1a1a1a;color:#e0e0e0;border:1px solid #333;border-radius:8px;padding:7px 10px;font-size:13px;outline:none}
select:focus,input:focus{border-color:#555}
#app{max-width:720px;margin:0 auto;padding:20px 16px}
.screen{display:none}.screen.active{display:block}

/* LOGIN */
#screen-login{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;text-align:center}
#screen-login.active{display:flex}
.login-icon{font-size:56px;margin-bottom:16px}
.login-title{font-size:24px;font-weight:600;color:#fff;margin-bottom:8px}
.login-sub{font-size:14px;color:#666;margin-bottom:32px;line-height:1.6}
.btn-google{display:flex;align-items:center;gap:10px;padding:12px 24px;font-size:15px;background:#fff;color:#1a1a1a;border:none;border-radius:10px;font-weight:500}
.btn-google:hover{background:#f0f0f0}
.btn-google svg{width:20px;height:20px}
.login-loading{font-size:13px;color:#555;margin-top:16px}

/* TOPBAR */
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.top-bar h1{font-size:20px;font-weight:600;color:#fff}
.top-bar-right{display:flex;align-items:center;gap:10px}
.balance{font-size:14px;color:#aaa}.balance span{color:#4ade80;font-weight:600}
.user-info{display:flex;align-items:center;gap:8px}
.user-avatar{width:28px;height:28px;border-radius:50%;border:1px solid #333}
.user-name{font-size:13px;color:#888}
.btn-logout{font-size:12px;padding:4px 10px;color:#888;border-color:#2a2a2a}

.section-label{font-size:11px;color:#666;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.biz-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px;margin-bottom:28px}
.biz-card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;padding:14px;transition:border-color .15s}
.biz-card.owned{cursor:pointer}.biz-card.owned:hover{border-color:#444}
.biz-icon{font-size:28px;margin-bottom:8px}
.biz-name{font-size:14px;font-weight:500;color:#fff;margin-bottom:3px}
.biz-desc{font-size:12px;color:#666;line-height:1.4;margin-bottom:8px}
.biz-price{font-size:13px;font-weight:600;color:#fff;margin-bottom:10px}
.biz-info{font-size:12px;color:#888;margin-top:4px}
.btn-buy{width:100%;padding:8px;font-size:13px;background:#1e3a2f;border-color:#2d5c45;color:#4ade80}
.btn-buy:hover{background:#244535}
.btn-buy:disabled{opacity:.4;cursor:not-allowed}

.biz-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.biz-header .icon{font-size:26px}
.biz-header h2{font-size:17px;font-weight:600;color:#fff}
.biz-header .sub{font-size:12px;color:#777;margin-top:2px}
.btn-back{margin-right:4px;padding:6px 12px;font-size:13px}
.btn-advance{margin-left:auto;padding:8px 18px;background:#1e3a2f;border-color:#2d5c45;color:#4ade80;font-size:13px}
.btn-advance:hover{background:#244535}

.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.tab-btn{padding:6px 13px;font-size:13px;border-radius:8px;border:1px solid transparent;color:#888}
.tab-btn.active{background:#1a2a3a;border-color:#2a4a6a;color:#60a5fa}
.panel{background:#141414;border:1px solid #222;border-radius:12px;padding:16px}

.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:18px}
.metric{background:#1a1a1a;border-radius:8px;padding:10px 12px}
.metric .lbl{font-size:11px;color:#666;margin-bottom:4px}
.metric .val{font-size:15px;font-weight:500;color:#fff}
.chart-wrap{margin-bottom:18px}
.chart-label{font-size:12px;color:#666;margin-bottom:6px}
.bars{display:flex;align-items:flex-end;gap:2px;height:56px}
.bar{flex:1;border-radius:2px 2px 0 0;background:#1e3a2f;min-height:3px}
.events .ev{font-size:12px;color:#888;padding:6px 0;border-bottom:1px solid #1f1f1f;display:flex;gap:8px}
.events .ev .day{color:#555;min-width:44px}

.emp-hire{display:flex;gap:8px;margin-bottom:16px}
.emp-hire select{flex:1}
.emp-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #1f1f1f}
.emp-row .name{font-size:13px;font-weight:500;color:#fff}
.emp-row .info{font-size:12px;color:#666;margin-top:2px}
.btn-fire{font-size:12px;padding:4px 10px;color:#f87171;border-color:#4a1f1f}
.btn-fire:hover{background:#2a1515}
.payroll{font-size:13px;color:#888;margin-bottom:12px}
.payroll span{color:#fff;font-weight:500}

.prod-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #1f1f1f}
.prod-row .info{flex:1}
.prod-row .pname{font-size:13px;font-weight:500;color:#fff}
.prod-row .pmeta{font-size:11px;color:#666;margin-top:2px}
.prod-row input{width:82px;text-align:right}

.stock-bar-wrap{background:#222;border-radius:4px;height:10px;overflow:hidden;margin-bottom:8px}
.stock-bar{height:100%;border-radius:4px;transition:width .4s}
.stock-status{font-size:13px;font-weight:500;margin-bottom:14px}
.btn-restock{width:100%;padding:10px;font-size:13px;margin-bottom:18px;background:#1e2a3a;border-color:#2a4060;color:#60a5fa}
.btn-restock:hover{background:#243040}

.sup-card{border:1px solid #2a2a2a;border-radius:10px;padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:border-color .15s,background .15s}
.sup-card:hover{border-color:#444}
.sup-card.active{border-color:#2a4a6a;background:#0f1e2e}
.sup-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.sup-name{font-size:14px;font-weight:500;color:#fff}
.sup-badge{font-size:11px;padding:2px 8px;border-radius:6px;background:#1a2a3a;color:#60a5fa;border:1px solid #2a4a6a}
.sup-meta{display:flex;gap:14px;font-size:12px;color:#666}

.save-indicator{font-size:11px;color:#555;text-align:right;margin-bottom:8px;height:16px}
.save-indicator.saving{color:#fbbf24}
.save-indicator.saved{color:#4ade80}

#notif{position:fixed;top:18px;left:50%;transform:translateX(-50%);background:#1e3a2f;border:1px solid #2d5c45;color:#4ade80;padding:10px 18px;border-radius:10px;font-size:13px;display:none;z-index:99;white-space:nowrap}
.empty{font-size:13px;color:#555;padding:8px 0}
</style>
</head>
<body>
<div id="notif"></div>
<div id="app">
  <div id="screen-login" class="screen active">
    <div class="login-icon">🏪</div>
    <div class="login-title">MEI Simulator</div>
    <div class="login-sub">Gerencie seus negócios, contrate funcionários,<br>negocie fornecedores e cresça do zero.</div>
    <button class="btn-google" onclick="loginGoogle()">

      Entrar com Google
    </button>
    <div class="login-loading" id="login-loading"></div>
  </div>
  <div id="screen-map" class="screen"></div>
  <div id="screen-biz" class="screen"></div>
</div>

<script type="module">

import{getFirestore,doc,getDoc,setDoc}from"https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";

  apiKey:"AIzaSyDdw5ETieWuq6Iki3Ri0YsZKW56NJCR2AI",

const fireApp=initializeApp(firebaseConfig);
const auth=getAuth(fireApp);
const db=getFirestore(fireApp);
let currentUser=null;
let saveTimeout=null;

const BUSINESSES=[

  ],
  lanchonete:[

    {id:"s3",name:"Distribuidora Mix",quality:3,pm:0.65,days:3,min:300},
  ],
  borracharia:[
    {id:"s1",name:"Borgens Distribuidora",quality:4,pm:0.72,days:3,min:400},
    {id:"s2",name:"Auto Peças Central",quality:5,pm:0.95,days:1,min:100},
    {id:"s3",name:"Importadora J&R",quality:3,pm:0.60,days:7,min:600},
  ],
  salao:[
    {id:"s1",name:"L'Oréal Distribuidor",quality:5,pm:1.00,days:2,min:150},
    {id:"s2",name:"Cosméticos Brasil",quality:4,pm:0.80,days:3,min:100},
    {id:"s3",name:"Atacado Beleza",quality:3,pm:0.65,days:5,min:200},
  ],
};
const ROLES={
  mercadinho:["Caixa","Repositor","Segurança","Gerente"],
  barbearia:["Barbeiro","Recepcionista","Gerente"],
  lanchonete:["Atendente","Cozinheiro","Caixa","Gerente"],
  borracharia:["Borracheiro","Auxiliar","Gerente"],
  salao:["Cabeleireiro","Manicure","Recepcionista","Gerente"],
};
const SALARIES={Caixa:1412,Repositor:1412,Segurança:1600,Gerente:3500,Barbeiro:2500,Recepcionista:1412,Cozinheiro:2000,Atendente:1412,Borracheiro:2200,Auxiliar:1412,Cabeleireiro:2500,Manicure:1800};
const PRODUCTS={
  mercadinho:[
    {id:"p1",name:"Bebidas",base:4.5,cr:0.55},
    {id:"p2",name:"Salgadinhos",base:3.0,cr:0.50},
    {id:"p3",name:"Limpeza",base:8.0,cr:0.60},

  ],
  barbearia:[
    {id:"p1",name:"Corte Simples",base:30,cr:0.20},
    {id:"p2",name:"Barba",base:20,cr:0.15},
    {id:"p3",name:"Corte + Barba",base:45,cr:0.18},
    {id:"p4",name:"Progressiva",base:80,cr:0.30},
  ],
  lanchonete:[
    {id:"p1",name:"X-Burguer",base:18,cr:0.35},
    {id:"p2",name:"Misto Quente",base:10,cr:0.30},
    {id:"p3",name:"Suco Natural",base:8,cr:0.25},

  ],
  borracharia:[

    {id:"p2",name:"Alinhamento",base:80,cr:0.30},
    {id:"p3",name:"Balanceamento",base:60,cr:0.25},
    {id:"p4",name:"Troca de Pneu",base:120,cr:0.50},
  ],
  salao:[
    {id:"p1",name:"Corte Feminino",base:60,cr:0.20},
    {id:"p2",name:"Escova",base:50,cr:0.15},
    {id:"p3",name:"Coloração",base:120,cr:0.35},
    {id:"p4",name:"Manicure/Pedicure",base:45,cr:0.15},
  ],
};
const EVENTS=[
  {msg:"Fiscalização sanitária! Multa de R$ 500.",fx:b=>{b.cash-=500}},
  {msg:"Semana boa! Vendas acima do esperado.",fx:b=>{b.cash+=800}},
  {msg:"Fornecedor atrasou. Estoque caiu.",fx:b=>{b.stock=Math.max(0,b.stock-15)}},
  {msg:"Encanamento estourou. Manutenção: R$ 350.",fx:b=>{b.cash-=350}},
  {msg:"Avaliação 5 estrelas no Google! Reputação +5.",fx:b=>{b.reputation=Math.min(100,b.reputation+5)}},
  {msg:"Promoção viral no WhatsApp. Ótimo movimento!",fx:b=>{b.cash+=600}},
  {msg:"Funcionário faltou. Produtividade caiu hoje.",fx:b=>{b.cash-=200}},
  {msg:"Cliente VIP voltou e trouxe amigos.",fx:b=>{b.cash+=400;b.reputation=Math.min(100,b.reputation+3)}},
];

const fmt=v=>"R$ "+parseFloat(v).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2});
const stars=n=>"★".repeat(n)+"☆".repeat(5-n);

let state={money:25000,owned:{},biz:{}};
let currentBiz=null;
let currentTab="dashboard";

function initBizData(id){
  return{
    id,cash:5000,reputation:60,stock:80,day:1,
    revenue:0,expenses:0,employees:[],
    supplier:SUPPLIERS[id][0].id,
    prices:Object.fromEntries(PRODUCTS[id].map(p=>[p.id,p.base])),
    history:[],events:[],
  };
}

function setSaveIndicator(status){
  const el=document.getElementById("save-indicator");
  if(!el)return;
  if(status==="saving"){el.className="save-indicator saving";el.textContent="Salvando..."}
  else if(status==="saved"){el.className="save-indicator saved";el.textContent="✓ Salvo"}
  else{el.className="save-indicator";el.textContent=""}
}

async function saveState(){
  if(!currentUser)return;
  setSaveIndicator("saving");
  try{
    await setDoc(doc(db,"users",currentUser.uid),{state:JSON.stringify(state),updatedAt:Date.now()});
    setSaveIndicator("saved");
    setTimeout(()=>setSaveIndicator(""),2000);
  }catch(e){console.error("Erro ao salvar:",e)}
}

function scheduleSave(){
  clearTimeout(saveTimeout);
  saveTimeout=setTimeout(saveState,1500);
}

async function loadState(){
  if(!currentUser)return;
  try{
    const snap=await getDoc(doc(db,"users",currentUser.uid));
    if(snap.exists()&&snap.data().state){
      state=JSON.parse(snap.data().state);
    }
  }catch(e){console.error("Erro ao carregar:",e)}
}

window.loginGoogle=async function(){
  document.getElementById("login-loading").textContent="Entrando...";
  try{
    const provider=new GoogleAuthProvider();
    await signInWithPopup(auth,provider);
  }catch(e){
    document.getElementById("login-loading").textContent="Erro ao entrar. Tente novamente.";
  }
};

window.logoutUser=async function(){
  await signOut(auth);
};

onAuthStateChanged(auth,async user=>{
  if(user){
    currentUser=user;
    document.getElementById("login-loading").textContent="Carregando seu progresso...";
    await loadState();
    showScreen("map");
    renderMap();
  }else{
    currentUser=null;
    showScreen("login");
  }
});

function notify(msg,color="#4ade80",bg="#1e3a2f",border="#2d5c45"){
  const el=document.getElementById("notif");
  el.textContent=msg;
  el.style.background=bg;el.style.borderColor=border;el.style.color=color;
  el.style.display="block";
  clearTimeout(el._t);
  el._t=setTimeout(()=>el.style.display="none",3000);
}

function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById("screen-"+id).classList.add("active");
}

function renderMap(){
  const el=document.getElementById("screen-map");
  const owned=Object.keys(state.owned);
  const name=currentUser?.displayName?.split(" ")[0]||"";
  const avatar=currentUser?.photoURL||"";

  let html=`<div class="top-bar">
    <h1>MEI Simulator</h1>
    <div class="top-bar-right">
      <div class="balance">Saldo: <span>${fmt(state.money)}</span></div>
      <div class="user-info">
        ${avatar?`<img class="user-avatar" src="${avatar}" referrerpolicy="no-referrer">`:""}
        <span class="user-name">${name}</span>
        <button class="btn-logout" onclick="logoutUser()">Sair</button>
      </div>
    </div>
  </div>`;

  if(owned.length){
    html+=`<div class="section-label">Meus negócios</div><div class="biz-grid">`;
    owned.forEach(id=>{
      const b=BUSINESSES.find(x=>x.id===id);
      const bs=state.biz[id];
      html+=`<div class="biz-card owned" onclick="openBiz('${id}')">
        <div class="biz-icon">${b.icon}</div>
        <div class="biz-name">${b.name}</div>
        <div class="biz-info">Dia ${bs.day} · ${fmt(bs.cash)}</div>
      </div>`;
    });
    html+=`</div>`;
  }

  const avail=BUSINESSES.filter(b=>!state.owned[b.id]);
  if(avail.length){
    html+=`<div class="section-label">Disponíveis para compra</div><div class="biz-grid">`;
    avail.forEach(b=>{
      const canBuy=state.money>=b.price;
      html+=`<div class="biz-card">
        <div class="biz-icon">${b.icon}</div>
        <div class="biz-name">${b.name}</div>
        <div class="biz-desc">${b.desc}</div>
        <div class="biz-price">${fmt(b.price)}</div>
        <button class="btn-buy" onclick="buyBiz('${b.id}')" ${canBuy?"":"disabled"}>Comprar</button>
      </div>`;
    });
    html+=`</div>`;
  }
  el.innerHTML=html;
}

window.buyBiz=function(id){
  const b=BUSINESSES.find(x=>x.id===id);
  if(state.money<b.price){notify("Dinheiro insuficiente!","#f87171","#2a1515","#4a1f1f");return;}
  state.money-=b.price;
  state.owned[id]=true;
  state.biz[id]=initBizData(id);
  notify(`${b.icon} ${b.name} comprado!`);
  scheduleSave();
  renderMap();
};

window.openBiz=function(id){
  currentBiz=id;currentTab="dashboard";
  showScreen("biz");renderBiz();
};

function renderBiz(){
  const b=BUSINESSES.find(x=>x.id===currentBiz);
  const bs=state.biz[currentBiz];
  const tabs=[
    {id:"dashboard",label:"📊 Painel"},
    {id:"funcionarios",label:"👥 Funcionários"},
    {id:"produtos",label:"🏷️ Produtos"},
    {id:"estoque",label:"📦 Estoque"},
    {id:"fornecedores",label:"🤝 Fornecedores"},
  ];
  let html=`
  <div class="biz-header">
    <button class="btn-back" onclick="goMap()">← Voltar</button>
    <div class="icon">${b.icon}</div>
    <div><h2>${b.name}</h2><div class="sub">Dia ${bs.day} · Caixa: ${fmt(bs.cash)}</div></div>
    <button class="btn-advance" onclick="advanceDay()">Avançar dia ▶</button>
  </div>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
    <div id="save-indicator" class="save-indicator"></div>
    <button onclick="sacarLucro()" style="font-size:12px;padding:5px 12px;background:#1a2a1a;border-color:#2d4a2d;color:#4ade80">💸 Sacar lucro pro bolso</button>
  </div>
  <div class="tabs">${tabs.map(t=>`<button class="tab-btn${currentTab===t.id?" active":""}" onclick="switchTab('${t.id}')">${t.label}</button>`).join("")}</div>
  <div class="panel">${renderTab(bs,b)}</div>`;
  document.getElementById("screen-biz").innerHTML=html;
}

function renderTab(bs,b){
  if(currentTab==="dashboard")return renderDashboard(bs);
  if(currentTab==="funcionarios")return renderFuncionarios(bs,b);
  if(currentTab==="produtos")return renderProdutos(bs,b);
  if(currentTab==="estoque")return renderEstoque(bs,b);
  if(currentTab==="fornecedores")return renderFornecedores(bs,b);
  return "";
}

function renderDashboard(bs){
  const maxRev=Math.max(...bs.history.map(h=>h.rev),1);
  const bars=bs.history.length
    ?bs.history.map(h=>`<div class="bar" style="height:${Math.max(3,(h.rev/maxRev)*56)}px" title="${fmt(h.rev)}"></div>`).join("")
    :`<div style="font-size:12px;color:#555">Avance o dia para ver o gráfico</div>`;
  const evHtml=bs.events.length
    ?`<div class="events">${bs.events.slice(0,5).map(e=>`<div class="ev"><span class="day">Dia ${e.day}</span>${e.msg}</div>`).join("")}</div>`
    :`<div class="empty">Nenhum evento ainda.</div>`;
  return`
  <div class="metrics">
    <div class="metric"><div class="lbl">Caixa</div><div class="val">${fmt(bs.cash)}</div></div>
    <div class="metric"><div class="lbl">Faturamento total</div><div class="val">${fmt(bs.revenue)}</div></div>
    <div class="metric"><div class="lbl">Reputação</div><div class="val">${bs.reputation}/100</div></div>
    <div class="metric"><div class="lbl">Estoque</div><div class="val">${bs.stock}%</div></div>
  </div>
  <div class="chart-wrap"><div class="chart-label">Receita diária</div><div class="bars">${bars}</div></div>
  <div class="chart-label" style="margin-bottom:8px">Eventos recentes</div>${evHtml}`;
}

function renderFuncionarios(bs,b){
  const payroll=bs.employees.reduce((s,e)=>s+e.salary,0);
  const opts=ROLES[b.id].map(r=>`<option value="${r}">${r} — ${fmt(SALARIES[r]||1412)}/mês</option>`).join("");
  const rows=bs.employees.length
    ?bs.employees.map(e=>`<div class="emp-row"><div><div class="name">${e.role}</div><div class="info">${fmt(e.salary)}/mês · satisfação ${e.happiness}%</div></div><button class="btn-fire" onclick="fireEmp(${e.id})">Demitir</button></div>`).join("")
    :`<div class="empty">Nenhum funcionário ainda.</div>`;
  return`<div class="payroll">Folha mensal: <span>${fmt(payroll)}</span> · ${bs.employees.length} funcionário(s)</div>
  <div class="emp-hire"><select id="hire-role"><option value="">Selecionar cargo...</option>${opts}</select><button onclick="hireEmp()">Contratar</button></div>${rows}`;
}

function renderProdutos(bs,b){
  const sup=SUPPLIERS[b.id].find(s=>s.id===bs.supplier);
  return PRODUCTS[b.id].map(p=>{
    const cost=(p.base*p.cr*sup.pm).toFixed(2);
    const price=bs.prices[p.id];
    const margin=price>0?((price-cost)/price*100).toFixed(0):0;
    return`<div class="prod-row"><div class="info"><div class="pname">${p.name}</div><div class="pmeta">Custo: ${fmt(cost)} · Margem: ${margin}%</div></div><input type="number" value="${price}" step="0.5" min="0" onchange="setPrice('${p.id}',this.value)"></div>`;
  }).join("");
}

function renderEstoque(bs,b){
  const sup=SUPPLIERS[b.id].find(s=>s.id===bs.supplier);
  const cost=(500*sup.pm).toFixed(0);
  const color=bs.stock>40?"#4ade80":"#f87171";
  const statusMsg=bs.stock<=20?"⚠️ Crítico! Reabasteça agora.":bs.stock<=50?"Atenção, repor em breve.":"Nível saudável.";
  return`<div style="background:#1a1a1a;border-radius:10px;padding:14px 16px;margin-bottom:14px">
    <div class="chart-label" style="margin-bottom:8px">Nível de estoque</div>
    <div class="stock-bar-wrap"><div class="stock-bar" style="width:${bs.stock}%;background:${color}"></div></div>
    <div class="stock-status" style="color:${color}">${bs.stock}% — ${statusMsg}</div>
  </div>
  <button class="btn-restock" onclick="restock()">Pedir reposição (+30%) — custo: ${fmt(cost)}</button>
  <div class="chart-label" style="margin-bottom:8px">Produtos monitorados</div>
  ${PRODUCTS[b.id].map(p=>`<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #1f1f1f;font-size:13px"><span>${p.name}</span><span style="color:#666">Preço: ${fmt(bs.prices[p.id])}</span></div>`).join("")}`;
}

function renderFornecedores(bs,b){
  return SUPPLIERS[b.id].map(s=>`
    <div class="sup-card${bs.supplier===s.id?" active":""}" onclick="setSupplier('${s.id}')">
      <div class="sup-top"><div class="sup-name">${s.name}</div>${bs.supplier===s.id?`<span class="sup-badge">ativo</span>`:""}</div>
      <div class="sup-meta"><span>Qualidade: ${stars(s.quality)}</span><span>Custo: ${Math.round(s.pm*100)}%</span><span>Entrega: ${s.days}d</span><span>Pedido mín: ${fmt(s.min)}</span></div>
    </div>`).join("");
}

window.goMap=function(){showScreen("map");renderMap();};
window.switchTab=function(t){currentTab=t;renderBiz();};

window.advanceDay=function(){
  const bs=state.biz[currentBiz];
  const sup=SUPPLIERS[currentBiz].find(s=>s.id===bs.supplier);
  const staffBonus=1+bs.employees.length*0.12;
  const repBonus=bs.reputation/100;
  const stockFactor=bs.stock>20?1:0.4;
  const baseRev=PRODUCTS[currentBiz].reduce((sum,p)=>sum+bs.prices[p.id]*(10+Math.random()*15),0);
  const dayRev=Math.round(baseRev*staffBonus*repBonus*stockFactor*(sup.quality/4));
  const dayCost=Math.round(bs.employees.reduce((s,e)=>s+e.salary/30,0));
  bs.cash+=dayRev-dayCost;
  bs.revenue+=dayRev;
  bs.expenses+=dayCost;
  bs.stock=Math.max(0,bs.stock-Math.round(4+Math.random()*8));
  bs.history.push({day:bs.day,rev:dayRev,exp:dayCost});
  if(bs.history.length>30)bs.history.shift();
  bs.day++;
  if(Math.random()<0.25){
    const ev=EVENTS[Math.floor(Math.random()*EVENTS.length)];
    ev.fx(bs);
    bs.events.unshift({day:bs.day-1,msg:ev.msg});
    if(bs.events.length>10)bs.events.pop();
    notify("📢 "+ev.msg,"#fbbf24","#2a2010","#504020");
  }
  scheduleSave();
  renderBiz();
};

window.hireEmp=function(){
  const role=document.getElementById("hire-role").value;
  if(!role){notify("Selecione um cargo!","#f87171","#2a1515","#4a1f1f");return;}
  const bs=state.biz[currentBiz];
  const salary=SALARIES[role]||1412;
  if(bs.cash<salary*0.1){notify("Caixa insuficiente!","#f87171","#2a1515","#4a1f1f");return;}
  bs.employees.push({id:Date.now(),role,salary,happiness:80});
  bs.cash-=salary*0.1;
  notify(`✅ ${role} contratado!`);
  scheduleSave();
  renderBiz();
};

window.fireEmp=function(id){
  state.biz[currentBiz].employees=state.biz[currentBiz].employees.filter(e=>e.id!==id);
  notify("Funcionário demitido.","#f87171","#2a1515","#4a1f1f");
  scheduleSave();
  renderBiz();
};

window.setPrice=function(pid,val){
  state.biz[currentBiz].prices[pid]=parseFloat(val)||0;
  scheduleSave();
  renderBiz();
};

window.restock=function(){
  const bs=state.biz[currentBiz];
  const sup=SUPPLIERS[currentBiz].find(s=>s.id===bs.supplier);
  const cost=Math.round(500*sup.pm);
  if(bs.cash<cost){notify("Sem caixa para repor!","#f87171","#2a1515","#4a1f1f");return;}
  bs.cash-=cost;
  bs.stock=Math.min(100,bs.stock+30);
  notify("📦 Estoque reposto +30%!");
  scheduleSave();
  renderBiz();
};

window.sacarLucro=function(){
  const bs=state.biz[currentBiz];
  const reserva=5000;
  const disponivel=Math.floor(bs.cash-reserva);
  if(disponivel<=0){notify("Caixa precisa ter mais de R$ 5.000 pra sacar.","#f87171","#2a1515","#4a1f1f");return;}
  bs.cash-=disponivel;
  state.money+=disponivel;
  notify(`💸 R$ ${disponivel.toLocaleString("pt-BR")} sacados pro seu bolso!`);
  scheduleSave();
  renderBiz();
  // atualiza saldo no header se voltar pro mapa
};

window.setSupplier=function(sid){
  state.biz[currentBiz].supplier=sid;
  notify("🤝 Fornecedor alterado!");
  scheduleSave();
  renderBiz();
};
</script>
</body>
</html>
